query CartInput {
  cart {
    lines {
      id
      quantity
      cost {
        subtotalAmount {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
            handle
            productType
            hasAnyTag(tags: ["car-scent", "car-scents", "auto-scent"])
          }
        }
      }
    }
  }
  discount {
    discountClasses
  }
  enteredDiscountCodes {
    code
    rejectable
  }
}
